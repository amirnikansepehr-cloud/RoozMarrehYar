<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="وب‌اپ شخصی مدیریت خانه، اقساط، یادآوری‌ها، بهداشت و روتین" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="styles.css" />
  <title>روزمره‌یار</title>
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">ر</div>
        <div>
          <strong>روزمره‌یار</strong>
          <small>مرکز مدیریت شخصی</small>
        </div>
      </div>
      <nav class="nav-list">
        <button class="nav-item active" data-route="dashboard">امروز</button>
        <button class="nav-item" data-route="home">خانه‌یار</button>
        <button class="nav-item" data-route="installments">قسط‌یار</button>
        <button class="nav-item" data-route="custom-reminders">یادآور</button>
        <button class="nav-item" data-route="hygiene">بهداشت‌یار</button>
        <button class="nav-item" data-route="routine">روتین‌یار</button>
        <button class="nav-item" data-route="settings">تنظیمات</button>
      </nav>
      <div class="sidebar-footer">
        <span id="storageStatus">ذخیره خودکار فعال</span>
      </div>
    </aside>

    <main class="main">
      <section id="route-dashboard" class="route active"></section>
      <section id="route-home" class="route"></section>
      <section id="route-installments" class="route"></section>
      <section id="route-custom-reminders" class="route"></section>
      <section id="route-hygiene" class="route"></section>
      <section id="route-routine" class="route"></section>
      <section id="route-settings" class="route"></section>
    </main>

    <nav class="bottom-nav">
      <button class="active" data-route="dashboard"><span>●</span>امروز</button>
      <button data-route="home"><span>⌂</span>خانه</button>
      <button data-route="installments"><span>₿</span>اقساط</button>
      <button data-route="hygiene"><span>✦</span>بهداشت</button>
      <button data-route="routine"><span>↻</span>روتین</button>
    </nav>
  </div>

  <dialog id="modal" class="modal">
    <form method="dialog" class="modal-card" id="modalForm">
      <div class="modal-head">
        <h3 id="modalTitle">افزودن</h3>
        <button value="cancel" class="icon-btn" aria-label="بستن">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button value="cancel" class="btn ghost">انصراف</button>
        <button value="default" class="btn primary" id="modalSubmit">ذخیره</button>
      </div>
    </form>
  </dialog>

  <input type="file" id="importInput" accept="application/json" hidden />
  <script src="app.js" defer></script>
</body>
</html>
